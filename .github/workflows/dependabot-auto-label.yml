# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Dependabot Auto Label

on:
    pull_request:
        branches: ["main"]

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    dependabot:
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        runs-on: ubuntu-latest
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
              with:
                  egress-policy: audit

            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Dependabot metadata
              id: metadata
              uses: dependabot/fetch-metadata@d7267f607e9d3fb96fc2fbe83e0af444713e90b7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Label direct production dependency updates
              if: steps.metadata.outputs.dependency-type == 'direct:production'
              run: gh pr edit "$PR_URL" --add-label "production-dependency"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_URL: ${{ github.event.pull_request.html_url }}

            - name: Label direct development dependency updates
              if: steps.metadata.outputs.dependency-type == 'direct:development'
              run: gh pr edit "$PR_URL" --add-label "development-dependency"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
